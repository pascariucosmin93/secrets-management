---
# Flow: you create the K8s Secret below → ESO PushSecret pushes it to Vault KV.
#
# 1. Create the K8s Secret (manually or via kubectl):
#      kubectl create secret generic cv-website-config \
#        --from-literal=db_password="s3cr3t" \
#        --from-literal=api_key="abc123" \
#        -n cv
#
# 2. Apply this PushSecret — ESO will push the keys to Vault at:
#      secret/data/cv/cv-website/config

apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cv-website-config-push
  namespace: cv
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-push
      kind: ClusterSecretStore
  selector:
    secret:
      name: cv-website-config    # K8s Secret to push
  data:
    - match:
        secretKey: db_password   # key in K8s Secret
        remoteRef:
          remoteKey: cv/cv-website/config   # path in Vault KV
          property: db_password             # key in Vault KV
    - match:
        secretKey: api_key
        remoteRef:
          remoteKey: cv/cv-website/config
          property: api_key
