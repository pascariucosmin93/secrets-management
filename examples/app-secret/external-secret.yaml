---
# Store a secret in Vault:
#   vault kv put secret/cv/cv-website/config db_password="s3cr3t" api_key="abc123"
#
# ESO will sync it into a Kubernetes Secret in the cv namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cv-website-config
  namespace: cv
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: cv-website-config
    creationPolicy: Owner
  data:
    - secretKey: db_password
      remoteRef:
        key: cv/cv-website/config
        property: db_password
    - secretKey: api_key
      remoteRef:
        key: cv/cv-website/config
        property: api_key
