---
# STEP 2 — SealedSecret (safe to commit to Git)
# Generated from secret.yaml using:
#   kubeseal --cert sealed-secrets/pub-cert.pem \
#            --scope namespace-wide \
#            -f examples/gitops-secret/secret.yaml \
#            -w examples/gitops-secret/sealed-secret.yaml
#
# The controller in namespace sealed-secrets decrypts this and creates
# a K8s Secret named cv-website-config in the cv namespace.
# Only the cluster's private key can decrypt it — the encrypted values below are safe to commit.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cv-website-config
  namespace: cv
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    db_password: "<encrypted-by-kubeseal — run fetch-cert.sh then kubeseal>"
    api_key: "<encrypted-by-kubeseal — run fetch-cert.sh then kubeseal>"
  template:
    metadata:
      name: cv-website-config
      namespace: cv
    type: Opaque
