---
# ClusterSecretStore with write permissions — used by PushSecret resources.
# Backed by a separate service account (external-secrets-push) with the eso-push Vault policy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-push
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-push
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-push"
          serviceAccountRef:
            name: external-secrets-push
            namespace: external-secrets
